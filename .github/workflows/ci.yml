name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        features:
          - label: "default"
            flags: "mmap,stopwords,lz4-compression,stemmer"
          - label: "all"
            flags: "mmap,stopwords,lz4-compression,zstd-compression,failpoints,stemmer"
          - label: "minimal"
            flags: ""

    name: test-${{ matrix.features.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          if [ -z "${{ matrix.features.flags }}" ]; then
            cargo build --lib --no-default-features
          else
            cargo build --features ${{ matrix.features.flags }} --no-default-features
          fi

      - name: Run lib tests
        run: |
          if [ -z "${{ matrix.features.flags }}" ]; then
            cargo test --lib --no-default-features
          else
            cargo test --lib --features ${{ matrix.features.flags }} --no-default-features
          fi

  clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: >
          cargo clippy --features mmap,stopwords,lz4-compression,stemmer --no-default-features --
          -D warnings
          -A clippy::uninlined_format_args
          -A clippy::identity_op
          -A clippy::let_and_return
          -A clippy::redundant_closure
          -A clippy::too_many_arguments
          -A clippy::assertions_on_constants
          -A dead_code
          -A unused_imports

  lucivy-python:
    runs-on: ubuntu-latest
    name: lucivy-python

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Build lucivy
        run: cd lucivy && maturin develop --release

      - name: Test lucivy
        run: |
          python3 -c "
          import lucivy

          # Create index
          idx = lucivy.Index.create('/tmp/ci_test', fields=[
              {'name': 'title', 'type': 'text'},
              {'name': 'body', 'type': 'text'},
              {'name': 'price', 'type': 'f64'},
          ], stemmer='english')

          # Add docs
          idx.add(1, title='Rust programming guide', body='Learn systems programming with Rust', price=29.99)
          idx.add(2, title='Python for data science', body='Data analysis with pandas and numpy', price=19.99)
          idx.add(3, title='C++ template metaprogramming', body='Advanced C++ techniques', price=39.99)
          idx.commit()
          assert idx.num_docs == 3, f'Expected 3 docs, got {idx.num_docs}'

          # contains_split (default string query)
          results = idx.search('rust program', limit=10)
          assert len(results) >= 1, 'contains_split should find results'
          assert results[0].doc_id == 1, 'doc 1 should be top result'

          # highlights
          results = idx.search('rust', limit=10, highlights=True)
          assert len(results) >= 1
          assert results[0].highlights is not None
          assert 'title' in results[0].highlights

          # fuzzy (typo)
          results = idx.search({'type': 'contains', 'field': 'body', 'value': 'programing', 'distance': 1}, limit=10)
          assert len(results) >= 1, 'fuzzy should catch typo'

          # regex
          results = idx.search({'type': 'contains', 'field': 'title', 'value': 'program[a-z]+', 'regex': True}, limit=10)
          assert len(results) >= 1, 'regex should match'

          # allowed_ids
          results = idx.search('programming', limit=10, allowed_ids=[1, 3])
          assert all(r.doc_id in (1, 3) for r in results), 'should only return filtered IDs'

          # delete + update
          idx.delete(2)
          idx.update(3, title='Modern C++', body='C++ best practices')
          idx.commit()
          assert idx.num_docs == 2

          print('All lucivy Python tests passed')
          "
